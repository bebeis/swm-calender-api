name: Deploy to Dev

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: backend-swm-teams-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Build with Gradle
        run: ./gradlew build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 via SSM
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "docker stop swm-teams-app || true",
                "docker rm swm-teams-app || true",
                "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin '"$REGISTRY"'",
                "docker pull '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"$IMAGE_TAG"'",
                "docker run -d --name swm-teams-app --restart unless-stopped -p 8080:8080 -e JAVA_OPTS=\"-Xmx256m\" -e DB_HOST=${{ secrets.DB_HOST }} -e DB_PORT=3306 -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} -e GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }} -e CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }} '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"$IMAGE_TAG"'"
              ]
            }' \
            --query 'Command.CommandId' \
            --output text)

          echo "Waiting for deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Status' --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deployment failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --query 'StandardErrorContent' --output text
            exit 1
          fi
          echo "Deployed successfully"

      - name: Verify health check
        run: |
          sleep 15
          HEALTH_CMD_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["curl -sf http://localhost:8080/actuator/health || exit 1"]}' \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$HEALTH_CMD_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$HEALTH_CMD_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Status' --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "::warning::Health check failed — app may still be starting"
          else
            echo "Health check passed"
          fi
