spring:
  datasource:
    url: jdbc:h2:mem:teams-core-api;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

example:
  api:
    url: https://default.example.example

management:
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false
