spring:
  application:
    name: teams
  config:
    import:
      - optional:classpath:monitoring.yml
      - optional:classpath:logging.yml
      - optional:classpath:client-example.yml
      - optional:classpath:gemini.yml
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/swm-teams?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${DB_USERNAME:swm_teams_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope: openid,email,profile,https://www.googleapis.com/auth/calendar

decorator:
  datasource:
    p6spy:
      multiline: true
      logging: slf4j

logging:
  level:
    org.springframework: info

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: "health,metrics,info,prometheus"
